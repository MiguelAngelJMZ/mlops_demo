# Demo MLOps - Databricks Asset Bundle
# Permite promover el mismo código entre dev y prod cambiando solo el target.

bundle:
  name: demo_mlops_aval

include:
  - resources/*.yml

variables:
  catalog:
    description: "Unity Catalog catalog name for this environment"
  schema:
    default: "mlops_demo"
    description: "Schema under the catalog for tables and model"

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: DEFAULT
    variables:
      catalog: "demo_mlops_aval_dev"
      schema: "mlops_demo"

  prod:
    mode: production
    workspace:
      profile: DEFAULT
      root_path: /Workspace/Users/miguel.jimenez@databricks.com/.bundle/demo_mlops_aval/prod
    variables:
      catalog: "demo_mlops_aval_prod"
      schema: "mlops_demo"
